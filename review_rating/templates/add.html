{% extends "base.html" %}

{% block title %}Add Review - Second Loop{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    <i class="bi bi-star text-warning"></i>
                    Add Review
                </h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="请输入您的用户名" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="rating" class="form-label">Rating</label>
                        <select class="form-select" id="rating" name="rating" required>
                            <option value="">Please Select a Rating</option>
                            <option value="1">⭐ 1 Star</option>
                            <option value="2">⭐⭐ 2 Star</option>
                            <option value="3">⭐⭐⭐ 3 Star</option>
                            <option value="4">⭐⭐⭐⭐ 4 Star</option>
                            <option value="5">⭐⭐⭐⭐⭐ 5 Star</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="comment" class="form-label">Review Content</label>
                        <textarea class="form-control" id="comment" name="comment" rows="4" 
                                  placeholder="Please share your review..." required></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-warning btn-lg" type="submit">
                            <i class="bi bi-star"></i> Submit Review
                        </button>
                        <a href="{{ url_for('review_rating.review') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </form>
                
                <div class="mt-3 text-center">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i>
                        Your review will help others user!
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
