{% extends "base.html" %}

{% block title %}Comment Successful - Second Loop{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow text-center">
            <div class="card-body p-5">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                </div>
                
                <h2 class="text-success mb-3">Review Submit Successful！</h2>
                
                <p class="lead">Thank you for your review！</p>
                <p class="text-muted">Your review will help others user!</p>
                
                <div class="mt-4">
                    <a href="{{ url_for('review_rating.review') }}" class="btn btn-primary me-2">
                        <i class="bi bi-star"></i> View all Reviews
                    </a>
                    <a href="{{ url_for('home') }}" class="btn btn-outline-primary">
                        <i class="bi bi-house"></i> Back to Home Page
                    </a>
                </div>
                
                <div class="mt-4">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i>
                        Review will be displayed after approval
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
